version: '3.8'

services:
  mimii-detector:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: mimii-anomaly-detector:latest
    container_name: mimii-detector
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    ports:
      - "7860:7860"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./data:/app/data:ro
      - ./logs:/app/logs
      - ./exports:/app/exports
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import torch; assert torch.cuda.is_available()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: TensorBoard service for monitoring training
  tensorboard:
    image: tensorflow/tensorflow:latest
    container_name: mimii-tensorboard
    command: tensorboard --logdir=/app/logs --host=0.0.0.0 --port=6006
    ports:
      - "6006:6006"
    volumes:
      - ./logs:/app/logs:ro
    profiles:
      - monitoring
    restart: unless-stopped

  # Optional: Redis for caching inference results
  redis:
    image: redis:7-alpine
    container_name: mimii-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    profiles:
      - cache
    restart: unless-stopped

volumes:
  redis_data:
